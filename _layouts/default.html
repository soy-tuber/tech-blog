<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="canonical" href="https://media.patentllm.org/">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 16px; background: #fafafa; color: #333; line-height: 1.8; }
    a { color: #1a73e8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1 { font-size: 1.4em; margin-bottom: 8px; }
    .header { border-bottom: 2px solid #333; padding-bottom: 12px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; }
    .header a { color: #333; font-weight: bold; }
    footer { margin-top: 40px; padding-top: 16px; border-top: 1px solid #ddd; text-align: center; font-size: 0.8em; color: #999; }
  </style>
</head>
<body>
  <div class="header">
    <a href="{{ site.baseurl }}/">{{ site.title }}</a>
    <a href="https://media.patentllm.org/" style="font-size:0.8em;">media.patentllm.org →</a>
  </div>
  {{ content }}
  <footer>&copy; 2026 soy-tuber | <a href="https://media.patentllm.org/">PatentLLM Tech Blog</a></footer>
</body>
</html>
