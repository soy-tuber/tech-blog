name: Sync Dev.to articles

on:
  schedule:
    # Daily at 06:00 UTC (15:00 JST)
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch articles from Dev.to
        run: python3 scripts/sync_devto.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _articles/devto-*.md
          if git diff --cached --quiet; then
            echo "No new articles to commit."
          else
            git commit -m "sync: update articles from Dev.to"
            git push
          fi
